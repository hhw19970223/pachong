<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills 广场 - AI技能发现平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .search-container {
            margin-bottom: 30px;
            text-align: center;
        }

        .search-box {
            display: inline-flex;
            background: white;
            border-radius: 25px;
            padding: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
        }

        .search-input {
            flex: 1;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 25px;
            outline: none;
        }

        .search-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-btn:hover {
            transform: scale(1.05);
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .filter-btn.active, .filter-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .skill-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .skill-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .skill-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .skill-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .skill-rank {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            font-size: 0.9rem;
        }

        .skill-info h3 {
            font-size: 1.3rem;
            margin-bottom: 5px;
            color: #333;
        }

        .skill-author {
            color: #666;
            font-size: 0.9rem;
        }

        .skill-description {
            color: #555;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .skill-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat {
            display: flex;
            align-items: center;
            color: #666;
            font-size: 0.9rem;
        }

        .stat i {
            margin-right: 5px;
            width: 16px;
        }

        .audit-status {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
        }

        .audit-green {
            background: #d4edda;
            color: #155724;
        }

        .audit-yellow {
            background: #fff3cd;
            color: #856404;
        }

        .audit-red {
            background: #f8d7da;
            color: #721c24;
        }

        .skill-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .install-btn {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .install-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(40,167,69,0.3);
        }

        .repo-link {
            color: #667eea;
            text-decoration: none;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .repo-link:hover {
            background: rgba(102,126,234,0.1);
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            margin: 40px 0;
        }

        .error {
            text-align: center;
            color: #ff6b6b;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .refresh-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .skills-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2.2rem;
            }
            
            .stats-bar {
                gap: 15px;
            }
            
            .stat-item {
                padding: 10px 15px;
            }
        }

        .pagination {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .page-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 0 5px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn:hover, .page-btn.active {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-robot"></i> Skills 广场</h1>
            <p>发现和探索优质 AI 技能包</p>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-number" id="total-skills">-</span>
                <span class="stat-label">技能总数</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="total-downloads">-</span>
                <span class="stat-label">总下载量</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="avg-stars">-</span>
                <span class="stat-label">平均星标</span>
            </div>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" class="search-input" placeholder="搜索技能包..." id="searchInput">
                <button class="search-btn" onclick="searchSkills()">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterSkills('all')">全部</button>
            <button class="filter-btn" onclick="filterSkills('high-download')">高下载量</button>
            <button class="filter-btn" onclick="filterSkills('high-stars')">高星标</button>
            <button class="filter-btn" onclick="filterSkills('green-audit')">安全认证</button>
        </div>

        <div class="loading" id="loading">
            <i class="fas fa-spinner fa-spin"></i> 加载技能数据中...
        </div>

        <div class="error" id="error" style="display: none;">
            <p>数据加载失败，请检查网络连接</p>
            <button class="refresh-btn" onclick="loadSkills()">重新加载</button>
        </div>

        <div class="skills-grid" id="skillsGrid" style="display: none;">
        </div>

        <div class="pagination" id="pagination" style="display: none;">
        </div>
    </div>

    <script src="/js/skills-plaza.js"></script>
</body>
</html>
